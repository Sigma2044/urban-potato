<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduAI – Glass Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar glass">
      <h2 class="logo">EduAI</h2>
      <p class="side-desc">Chat & Bildanalyse</p>

      <div class="upload-box glass">
        <p>📷 Bild auswählen</p>
        <input type="file" id="imageInput" accept="image/*">
      </div>

      <div class="info-box glass">
        <h3>Funktionen</h3>
        <ul>
          <li> KI‑Chat</li>
          <li> Erklärungen</li>
          <li> Bildanalyse</li>
          <li> Coding‑Hilfe</li>
        </ul>
      </div>
    </aside>

    <!-- Chat -->
    <main class="chat-area glass">
      <div id="chat-box" class="chat-box"></div>

      <div class="input-row glass">
        <input id="msg" placeholder="Frag EduAI etwas…">
        <button onclick="sendMessage()">Senden</button>
      </div>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
