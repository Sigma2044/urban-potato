<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduAI - Smart Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #171717;
            --text-main: #e5e5e5;
            --accent: #3b82f6;
            --bubble-user: #2563eb;
            --bubble-ai: #262626;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
        }

        /* Scrollbar Design */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 10px; }

        .app-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            width: 100%;
        }

        /* Top Header */
        .top-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-img {
            height: 28px;
            max-width: 120px;
            object-fit: contain;
            display: block;
        }

        .logo-fallback {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-dropdown {
            position: absolute;
            top: 3.5rem;
            left: 1rem;
            background: #1f1f1f;
            border: 1px solid #333;
            border-radius: 0.75rem;
            display: none;
            flex-direction: column;
            min-width: 200px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: fadeIn 0.2s ease-out;
        }

        .nav-item {
            padding: 0.875rem 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #d4d4d4;
            font-size: 0.9rem;
        }

        .nav-item:hover { background: #2d2d2d; color: white; }
        .nav-item.active { color: var(--accent); background: rgba(59, 130, 246, 0.1); }

        /* Chat Window */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 5rem 1rem 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
            width: 100%;
        }

        .message {
            max-width: 88%;
            padding: 0.65rem 0.9rem;
            border-radius: 1.15rem;
            font-size: 0.925rem;
            line-height: 1.45;
            position: relative;
            animation: msgSlide 0.25s ease-out;
            word-wrap: break-word;
            width: fit-content;
        }

        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-user {
            align-self: flex-end;
            background-color: var(--bubble-user);
            color: white;
            border-bottom-right-radius: 0.2rem;
        }

        .message-ai {
            align-self: flex-start;
            background-color: var(--bubble-ai);
            color: var(--text-main);
            border-bottom-left-radius: 0.2rem;
            white-space: pre-wrap;
        }

        .welcome-msg { white-space: normal !important; }

        /* Thinking Animation */
        .ai-thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--bubble-ai);
            border-radius: 1.15rem;
            border-bottom-left-radius: 0.2rem;
            width: fit-content;
            margin-bottom: 0.5rem;
        }

        .thinking-wave {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 12px;
        }

        .wave-bar {
            width: 3px;
            height: 6px;
            background: var(--accent);
            border-radius: 1px;
            animation: waveAnim 0.8s infinite ease-in-out;
        }

        .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 9px; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 12px; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 9px; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 6px; }

        @keyframes waveAnim {
            0%, 100% { transform: scaleY(1); opacity: 0.4; }
            50% { transform: scaleY(1.6); opacity: 1; background: #60a5fa; }
        }

        /* Input Area */
        .input-area {
            padding: 0.5rem 1rem 1.25rem 1rem;
            background: var(--bg-color);
        }

        .input-wrapper {
            background-color: var(--card-bg);
            border: 1px solid #262626;
            border-radius: 1.75rem;
            display: flex;
            align-items: center;
            padding: 0.3rem 0.5rem;
            position: relative;
        }

        #message-input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            padding: 0.6rem 0.5rem;
            outline: none;
            font-size: 1rem;
            min-width: 0;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
            color: #a3a3a3;
            cursor: pointer;
            flex-shrink: 0;
        }

        .icon-btn:active { background-color: #333; transform: scale(0.95); }

        /* Neuer Style für den Bild-Auswahl Button */
        .plus-btn-styled {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff !important;
        }
        
        .plus-btn-styled:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        /* Action Menu Styling */
        .action-menu {
            position: absolute;
            bottom: 100%;
            left: 0.5rem;
            margin-bottom: 0.75rem;
            background: #1f1f1f;
            border: 1px solid #333;
            border-radius: 1rem;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            min-width: 180px;
            overflow: hidden;
            animation: menuPop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes menuPop {
            from { opacity: 0; transform: scale(0.8) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .menu-item {
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #d4d4d4;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .menu-item:hover { background: #2d2d2d; color: white; }
        .menu-item svg { color: var(--accent); }

        #image-preview-container { 
            display: none; 
            padding: 0.5rem 1rem; 
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            background: var(--bg-color);
            z-index: 10;
        }

        .view { display: none; height: 100%; overflow: hidden; }
        .view.active { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 380px) {
            .message { max-width: 92%; font-size: 0.875rem; }
            .logo-fallback { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="top-header">
            <div class="logo-container">
                <button class="icon-btn" id="menu-toggle-btn" aria-label="Menü">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div id="logo-wrapper">
                    <img src="content.png" alt="eduai" class="logo-img" id="main-logo" onerror="handleLogoError()">
                </div>
            </div>
            
            <div id="nav-dropdown" class="nav-dropdown">
                <div class="nav-item active" onclick="switchView('chat')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    Chat
                </div>
                <div class="nav-item" onclick="switchView('features')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    Features & Info
                </div>
            </div>
        </header>

        <!-- Chat View -->
        <div id="chat-view" class="view active">
            <div id="chat-window">
                <div class="message message-ai welcome-msg">
                    Hey! Ich bin <strong>EduAI</strong>. Ich helfe dir beim Lernen, Planen und Verstehen. Frag mich einfach alles!
                </div>
            </div>

            <div class="input-area">
                <div id="image-preview-container">
                    <div class="preview-badge">
                        <span id="file-name" class="truncate max-w-[150px]">bild.jpg</span>
                        <button onclick="clearImage()" class="ml-2 text-red-400">✕</button>
                    </div>
                </div>

                <form id="chat-form" class="input-wrapper" onsubmit="handleChatSubmit(event)">
                    <input type="file" id="file-input" accept="image/*" hidden onchange="handleFileChange()">
                    
                    <!-- Verbessertes Plus Menü -->
                    <div id="plus-menu" class="action-menu">
                        <div class="menu-item" onclick="document.getElementById('file-input').click()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            Bild wählen
                        </div>
                    </div>

                    <button type="button" id="plus-btn" class="icon-btn plus-btn-styled" onclick="togglePlusMenu(event)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>

                    <input type="text" id="message-input" placeholder="Nachricht an eduai..." autocomplete="off">

                    <button type="submit" id="send-btn" class="icon-btn" style="color: var(--accent)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </div>

        <!-- Features View -->
        <div id="features-view" class="view p-6 pt-24 overflow-y-auto">
            <h1 class="text-2xl font-bold mb-4">EduAI Features</h1>
            <div class="space-y-4">
                <div class="p-4 bg-[#171717] rounded-xl border border-[#262626]">
                    <h3 class="text-blue-400 font-bold">🚀 Hausaufgaben-Hilfe</h3>
                    <p class="text-sm text-gray-400 mt-1">Lade Fotos von Aufgaben hoch oder beschreibe sie einfach.</p>
                </div>
                <div class="p-4 bg-[#171717] rounded-xl border border-[#262626]">
                    <h3 class="text-blue-400 font-bold">📚 Lernpläne</h3>
                    <p class="text-sm text-gray-400 mt-1">Lass dir individuelle Pläne für Prüfungen erstellen.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('image-preview-container');
        const navDropdown = document.getElementById('nav-dropdown');
        const plusMenu = document.getElementById('plus-menu');

        const API_URL = 'https://eduai-5b85.onrender.com/chat';

        function handleLogoError() {
            const wrapper = document.getElementById('logo-wrapper');
            wrapper.innerHTML = '<span class="logo-fallback">eduai</span>';
        }

        document.getElementById('menu-toggle-btn').onclick = (e) => {
            e.stopPropagation();
            navDropdown.style.display = navDropdown.style.display === 'flex' ? 'none' : 'flex';
            plusMenu.style.display = 'none';
        };

        function togglePlusMenu(e) {
            e.stopPropagation();
            plusMenu.style.display = plusMenu.style.display === 'flex' ? 'none' : 'flex';
            navDropdown.style.display = 'none';
        }

        document.onclick = () => {
            navDropdown.style.display = 'none';
            plusMenu.style.display = 'none';
        };

        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(view + '-view').classList.add('active');
            navDropdown.style.display = 'none';
            if (view === 'chat') chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function handleFileChange() {
            if (fileInput.files[0]) {
                document.getElementById('file-name').textContent = fileInput.files[0].name;
                previewContainer.style.display = 'block';
                plusMenu.style.display = 'none';
            }
        }

        function clearImage() {
            fileInput.value = '';
            previewContainer.style.display = 'none';
        }

        function formatText(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        function appendMessage(role, text, imgUrl = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message message-${role}`;
            
            if (imgUrl) {
                const img = document.createElement('img');
                img.src = imgUrl;
                img.className = 'rounded-lg mb-2 max-w-full h-auto';
                msgDiv.appendChild(img);
            }
            
            if (text) {
                const content = document.createElement('div');
                content.innerHTML = role === 'ai' ? formatText(text) : text;
                msgDiv.appendChild(content);
            }
            
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function handleChatSubmit(e) {
            e.preventDefault();
            const text = messageInput.value.trim();
            const file = fileInput.files[0];
            if (!text && !file) return;

            const localImg = file ? URL.createObjectURL(file) : null;
            appendMessage('user', text, localImg);
            
            messageInput.value = '';
            clearImage();

            const thinking = document.createElement('div');
            thinking.className = 'ai-thinking';
            thinking.innerHTML = `
                <div class="thinking-wave">
                    <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
                </div>
            `;
            chatWindow.appendChild(thinking);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            const formData = new FormData();
            formData.append('message', text);
            if (file) formData.append('image', file);

            try {
                const res = await fetch(API_URL, { method: 'POST', body: formData });
                const data = await res.json();
                thinking.remove();
                appendMessage('ai', data.reply || data.response || "Antwort erhalten.");
            } catch (err) {
                thinking.remove();
                appendMessage('ai', "Netzwerkfehler.");
            }
        }

        window.addEventListener('resize', () => {
            if (document.activeElement.tagName === 'INPUT') {
                setTimeout(() => {
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }, 50);
            }
        });
    </script>
</body>
</html>
