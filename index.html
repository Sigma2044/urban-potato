<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EduAI – Dein smarter KI‑Chatbot</title>
  <meta name="description" content="EduAI beantwortet deine Fragen sofort – schnell, intelligent und kostenlos.">

  <link rel="stylesheet" href="style.css">

  <!-- Google AdSense Client -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9858751801616084"
     crossorigin="anonymous"></script>
</head>

<body>
  <div class="page-wrapper">

    <header class="header">
      <div class="logo-title">
        <img src="logo.png" class="logo-img">
        <div>
          <h1>EduAI</h1>
          <p class="subtitle">Der schnelle, smarte KI‑Chatbot</p>
        </div>
      </div>
      <p class="header-text">
        Stelle jede Frage – EduAI antwortet sofort. Einfach, schnell und kostenlos.
      </p>
    </header>

    <!-- TOP AD -->
    <section class="ad-section">
      <ins class="adsbygoogle"
          style="display:block"
          data-ad-client="ca-pub-9858751801616084"
          data-ad-slot="7488585387"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </section>

    <!-- FULLSCREEN CHAT -->
    <main class="chat-fullscreen">

      <section class="chat-card">

        <div id="chat-box" class="chat-box"></div>

        <div class="input-row">
          <input id="msg" placeholder="Frag EduAI etwas…">
          <button onclick="sendMessage()">Senden</button>
        </div>

        <!-- Vision Upload -->
        <input type="file" id="imageInput" accept="image/*" class="upload-input">

      </section>

    </main>

    <!-- BOTTOM AD -->
    <section class="ad-section ad-bottom">
      <ins class="adsbygoogle"
          style="display:block"
          data-ad-client="ca-pub-9858751801616084"
          data-ad-slot="7488585387"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </section>

    <footer class="footer">
      <p>© 2026 EduAI – Smarter KI‑Chatbot</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
